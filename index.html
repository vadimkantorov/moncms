        <div id="editor"></div>

        <script>
        const html_url = document.getElementById('html_url');
        const html_token = document.getElementById('html_token');
        const html_tokencache = document.getElementById('html_tokencache');
        const html_log = document.getElementById('html_log');
        const html_file_name = document.getElementById('html_file_name');
        
        window.editor_getText = window.editor_setText = (text = '') => '';

        let retrieved_contents = {}; 
        
        function moncms_log(text)
        {
            const prefix = new Date().toISOString();
            html_log.value = `${prefix}: ${text}`;
            //html_log.value += '\n' + text; html_log.scrollTop = html_log.scrollHeight;
        }

        function cache_load(key, method = 'localStorage')
        {
            if(method == 'localStorage')
                return localStorage.getItem("moncms_" + key);
            
            if(method == 'cookie')
                return (document.cookie.split(';').filter(k_v => k_v.split('=')[0] == key)[0] || '').split('=')[1];
        }
        
        function cache_save(key, value, method = 'localStorage')
        {
            if(method == 'localStorage')
            {
                if(value)
                    localStorage.setItem("moncms_" + key, value);
                else
                    localStorage.removeItem("moncms_" + key);
            }

            if(method == 'cookie')
            {
                if(value)
                    document.cookie = document.cookie ? (document.cookie + ';' + key + '=' + value) : (key + '=' + value);
                else
                    document.cookie = document.cookie.split(';').filter(k_v => k_v.split('=')[0] != key).join(';'); 
            }
        }

        async function onload_editor()
        {
            if(window.LexicalMarkdownEditor)
            {
                const editor = await window.LexicalMarkdownEditor('#editor');
                window.editor_getText = () => editor.getMarkdown();
                window.editor_setText = md => editor.setMarkdown(md);
            }
        }

        function github_api_format_error(resp_status, res_message)
        {
            return `${resp_status}: ` + ({200: 'OK', 201: 'Created', 404: 'Resource not found', 409: 'Conflict', 422: 'Validation failed, or the endpoint has been spammed.', 401: 'Unauthorized', 403: 'Forbidden: ' + res_message}[resp_status] || '');
        }

        function github_api_prepare_params(github_url, github_token = '')
        {
            const prep = {headers : {}, error : '', contents_api_url : '', contents_api_dir_url : '', github_repo_url : ''};
            if(!github_url)
            {
                prep.error = 'no github_url provided';
                return prep;
            }
            
            // https://docs.github.com/en/rest/repos/contents?apiVersion=2022-11-28
            const github_url_normalized = github_url.replace('https://raw.githubusercontent.com', 'https://github.com');
            
            let github_repo_username = '', github_repo_name = '', github_repo_tag = '', github_repo_file_path = '', github_repo_dir_path = '';

            const m1 = github_url_normalized.match(/https:\/\/github.com\/(.+)\/(.+)\/blob\/(.+?)\/(.+)/i);
            const m2 = github_url_normalized.match(/https:\/\/github.com\/(.+)\/(.+)\/tree\/(.+?)\/(.+)/i);
            const m3 = github_url_normalized.match(/https:\/\/github.com\/(.+)\/(.+)\/tree\/(.+)/i);
            const m4 = github_url_normalized.match(/https:\/\/github.com\/(.+)\/(.+)\/?/i);
            
            if(m1)
                [, github_repo_username, github_repo_name, github_repo_tag, github_repo_file_path] = m1;
            else if(m2)
                [, github_repo_username, github_repo_name, github_repo_tag, github_repo_dir_path] = m2;
            else if(m3)
                [, github_repo_username, github_repo_name, github_repo_tag] = m3;
            else if(m4)
                [, github_repo_username, github_repo_name] = m4;
            else
            {
                prep.error = 'github_url could not be matched';
                return prep;
            }
            github_repo_dir_path = github_repo_dir_path.replace(/\/$/g, '');
            github_repo_tag = github_repo_tag.replace(/\/$/g, '');

            const github_repo_path = github_repo_file_path || github_repo_dir_path;
            
            const github_repo_parent_path = !github_repo_path ? '' : github_repo_path.includes('/') ? github_repo_path.slice(0, github_repo_path.lastIndexOf('/')) : '';
            prep.github_repo_url = `https://github.com/${github_repo_username}/${github_repo_name}`;
            prep.github_repo_path = github_repo_path;
            prep.contents_api_url = `https://api.github.com/repos/${github_repo_username}/${github_repo_name}/contents/${github_repo_path}` + (github_repo_tag ? `?ref=${github_repo_tag}` : ''); 
            prep.contents_api_dir_url = github_repo_dir_path ? prep.contents_api_url : (`https://api.github.com/repos/${github_repo_username}/${github_repo_name}/contents/${github_repo_parent_path}` + (github_repo_tag ? `?ref=${github_repo_tag}` : ''));
            
            const slashIdx2 = github_repo_path.lastIndexOf('/');
            const slashIdx1 = github_repo_path.slice(0, slashIdx2).lastIndexOf('/');
            const github_repo_parentdir_path = github_repo_path ? (slashIdx2 != -1 ? github_repo_path.slice(0, slashIdx2) : '') : github_repo_file_path ? ((slashIdx2 != -1 && slashIdx1 != -1) ? github_repo_path.slice(0, slashIdx1) : (slashIdx2 != -1 && slashIdx1 == -1) ? '' : null) : null;
            const github_repo_curdir_path = github_repo_path ? (slashIdx2 != -1 ? github_repo_path.slice(0, slashIdx2) : '') : null;

            prep.parentdir_url = github_repo_parentdir_path != null ? `https://github.com/${github_repo_username}/${github_repo_name}/tree/${github_repo_tag}/${github_repo_parentdir_path}` : '';
            prep.curdir_url = github_repo_curdir_path != null ? `https://github.com/${github_repo_username}/${github_repo_name}/tree/${github_repo_tag}/${github_repo_curdir_path}` : '';
            
            // https://docs.github.com/en/rest/repos/contents?apiVersion=2022-11-28
            prep.headers = {
                'X-GitHub-Api-Version' : '2022-11-28',
                'Accept': 'application/vnd.github+json',
                'If-None-Match' : '',
                'Authorization' : github_token ? `Bearer ${github_token}` : ''
            };
            
            return prep;
        }

        function clear(file_tree = true)
        {
            retrieved_contents = {};
            html_file_name.value = html_file_name.title = '';
            if(file_tree)
            {
                for(let i = html_file_tree.options.length - 1; i >= 1; i--)
                    html_file_tree.options.remove(i);
                for(let i = html_images.length - 1; i >= 0; i--)
                    html_images.removeChild(html_images.children[i]);
            }
            return window.editor_setText('');
        }
        
        async function onclick_create()
        {
            await clear(false);
            html_file_name.focus();
        }

        function onchange_tokencache()
        {
            if(!html_tokencache.checked)
            {
                const prep = github_api_prepare_params(html_url.value);
                if(prep.github_repo_url)
                {
                    cache_save(prep.github_repo_url, null);
                    moncms_log('purged cache for ' + prep.github_repo_url);
                }
            }
        }

        function onkeypress_enter_url(event)
        {
            if (event.code === 'Enter')
            {
                event.preventDefault();
                onclick_open();
            }
        }
        
        function dirname(path)
        {
            if(!path)
                return '';
            return path.includes('/') ? path.slice(0, path.lastIndexOf('/')) : '';
        }
        
        function basename(path)
        {
            if(!path)
                return '';
            return path.includes('/') ? path.substring(1 + path.lastIndexOf('/')) : path;
        }

        function join2(path1, path2)
        {
            const path1_ = path1[path1.length - 1] == '/' ? path1.slice(0, path1.length - 1) : path1
            const _path2 = path2[0] == '/' ? path2.substring(1): path2;
            return (path1 && path2) ? (path1_ + '/' + _path2) : (path1 && !path2) ? path1 : (!path1 && path2) ? path2 : ''
        }

        async function onclick_del()
        {
            if(!retrieved_contents || !html_file_name.value || !window.confirm('Do you really want to delete this file?'))
                return;

            const prep = github_api_prepare_params(html_url.value, html_token.value);
            if(prep.error != '')
                return moncms_log(prep.error);
        
            const req = {
                path : retrieved_contents.path,
                sha: retrieved_contents.sha,
                message : 'no commit message',
            };
        
            const resp = await fetch(prep.contents_api_url, { method: 'DELETE', headers: prep.headers, body: JSON.stringify(req) });
            const res = await resp.json();

            delete_file_tree(html_file_name.value);
            html_url.value = prep.curdir_url;
            
            clear(false);
            moncms_log(`DEL ok ${resp.status}`);
        }
        
        async function onclick_upload()
        {
        }

        async function onclick_save()
        {
            // https://stackoverflow.com/questions/31563444/rename-a-file-with-github-api
            // https://medium.com/@obodley/renaming-a-file-using-the-git-api-fed1e6f04188
            // https://www.levibotelho.com/development/commit-a-file-with-the-github-api/

            const prep = github_api_prepare_params(html_url.value, html_token.value);
            if(prep.error != '')
                return moncms_log(prep.error);

            const text = await editor_getText();
            const base64 = window.btoa(String.fromCodePoint(...(new TextEncoder().encode(text))));
            if(retrieved_contents.encoding == 'base64' && retrieved_contents.contents == base64 && html_file_name.value == retrieved_contents.name)
                return moncms_log('no changes');
           
            const should_rename = retrieved_contents && html_file_name.value != retrieved_contents.name;
            const should_update = retrieved_contents && html_file_name.value == retrieved_contents.name;
            const should_create = !retrieved_contents && html_file_name.value;

            if(should_update)
            {
                const req = {
                    path : retrieved_contents.path,
                    sha: retrieved_contents.sha,
                    message : 'no commit message',
                    content : base64,
                };
                const resp = await fetch(prep.contents_api_url, { method: 'PUT', headers: prep.headers, body: JSON.stringify(req) });
                const res = await resp.json();
                retrieved_contents = {encoding: 'base64', contents : base64, sha: res.content.sha, path: res.content.path};
                moncms_log(`PUT ok ${resp.status}`);
            }
            
            if(should_rename)
            {
                const req_put = {
                    path : join2(dirname(retrieved_contents.path), html_file_name.value),
                    message : 'no commit message',
                    content : base64,
                };
                const resp_put = await fetch(path2(dirname(prep.contents_api_url), html_file_name.value), { method: 'PUT', headers: prep.headers, body: JSON.stringify(req_put) });
                const res_put = await resp_put.json();
                retrieved_contents = {encoding: 'base64', contents : base64, sha: res_put.content.sha, path: res_put.content.path};
                moncms_log(`PUT ok ${resp_put.status}`);

                const req_del = {
                    path : retrieved_contents.path,
                    sha: retrieved_contents.sha,
                    message : 'no commit message',
                };
                const resp_del = await fetch(prep.contents_api_url, { method: 'DELETE', headers: prep.headers, body: JSON.stringify(req_del) });
                const res = await resp_del.json();
                moncms_log(`DEL ok ${resp_del.status}`);
            }
        }
        
        function delete_file_tree(selected_file_name)
        {
            for(const option of html_file_tree.querySelectorAll(`option[title="${selected_file_name}"]`))
                html_file_tree.removeChild(option);
            for(const li of html_images.querySelectorAll(`li[title="${selected_file_name}"]`))
                html_images.removeChild(li);
        }


        function update_file_tree(files_and_dirs, parentdir_url, selected_file_name, ext = ['.gif', '.jpg', '.png', '.svg'])
        {
            const key_by_name = (a, b) => a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
            const files = files_and_dirs.filter(j => j.type == 'file' && !ext.some(e => j.name.endsWith(e))).sort(key_by_name);
            const dirs  = files_and_dirs.filter(j => j.type == 'dir'  && !ext.some(e => j.name.endsWith(e))).sort(key_by_name);
            const images = files_and_dirs.filter(j =>j.type == 'file' && ext.some(e => j.name.endsWith(e))).sort(key_by_name);

            const file_tree = [...(parentdir_url ? [{name : '..', type: 'dir', html_url : parentdir_url}] : []), ...dirs, ...files]; 
            let i = 0;
            for(; i < file_tree.length; i++)
            {
                let html_option = html_file_tree.options[1 + i];
                if(html_option == null)
                {
                    html_option = document.createElement('option');
                    html_file_tree.options.add(html_option);
                }
                html_option.text = file_tree[i].name + (file_tree[i].type == 'dir' ? '/' : '' );
                html_option.selected = file_tree[i].name == selected_file_name;
                html_option.value = file_tree[i].html_url;
                html_option.title = file_tree[i].name;
                html_option.dataset.type = file_tree[i].type;
            }
            for(let j = html_file_tree.length - 1; j > i; j--)
                html_file_tree.options.remove(j);

            i = 0;
            for(; i < images.length; i++)
            {
                let html_li = html_images.children[i], html_img = null, html_figcaption = null;
                if(html_li == null)
                {
                    html_li = document.createElement('li');
                    const html_figure = document.createElement('figure');
                    html_img = document.createElement('img');
                    html_figcaption = document.createElement('figcaption');
                    html_figure.appendChild(html_figcaption);
                    html_figure.appendChild(html_img);
                    html_li.appendChild(html_figure);
                    html_images.appendChild(html_li);
                }
                else
                {
                    html_figcaption = html_li.getElementsByTagName('figcaption')[0];
                    html_img = html_li.getElementsByTagName('img')[0];
                }
                html_figcaption.innerText = html_li.title = images[i].name;
                html_img.src = images[i].download_url;
            }
            for(let j = html_images.children.length - 1; j >= i; j--)
                html_images.removeChild(html_images.children[j]);
            
            html_images.hidden = images.length == 0;
        }

        function update_frontmatter(frontmatter)
        {
            const html_header = html_frontmatter.getElementsByTagName('tr')[0];
            Array.from(html_header.getElementsByTagName('input')).forEach(input => input.value = '');
            
            const entries = Object.entries(frontmatter);
            console.log(entries);
            
            let i = 0;
            for(; i < entries.length; i++)
            {
                const [k, v] = entries[i];
                let html_row = html_frontmatter.rows[1 + i];
                if(html_row == null)
                {
                    html_row = html_header.cloneNode(true);
                    html_frontmatter.appendChild(html_row);
                }

                const [html_inputkey, html_inputval] = Array.from(html_row.getElementsByTagName('input'));
                [html_inputkey.value, html_inputval.value] = [`${k}`, `${v}`];
            }
            for(let j = html_frontmatter.rows.length - 1; j > i; j--)
                html_frontmatter.deleteRow(j);
        }

        function parse_frontmatter(text)
        {
            const m = text.match(/^---\n(.*?)\n---\n*/s);
            const frontmatter = {};
            if(m)
            {
                const frontmatter_str = m[1];
                text = text.substring(m[0].length);

                const procval = s => (s.length >= 2 && s[0] == '"' && s[s.length - 1] == '"') ? s.slice(1, s.length - 1) : (s.length >= 2 && s[0] == "'" && s[s.length - 1] == "'") ? s.slice(1, s.length - 1) : s;

                for(const line of frontmatter_str.split('\n'))
                {
                    const line_strip = line.trim();
                    const is_list_item = line_strip.startsWith('- ');
                    if(!line || line.startsWith('#'))
                        continue;

                    const colonIdx = line.indexOf(':');
                    const key = colonIdx != -1 ? line.slice(0, colonIdx).trim() : '';
                    const val = colonIdx != -1 ? line.substring(1 + colonIdx).trim() : is_list_item ? line_strip.substring(2).trim() : '';
                    
                    if(colonIdx != -1)
                        frontmatter[key] = val ? procval(val) : [];
                    else if(is_list_item)
                        front_matter[key].push(procval(val));
                }
            }
            return [text, frontmatter];
        }

        function onclick_addrow(event)
        {
            event.preventDefault();
            const html_row = event.target.parentElement.parentElement;
            const rowIdx = html_row.rowIndex;
            
            const html_header = html_row.cloneNode(true);
            const [html_inputkey, html_inputval] = Array.from(html_header.getElementsByTagName('input'));
            [html_inputkey.value, html_inputval.value] = ['', ''];
            
            if(rowIdx == 0)
                html_row.parentNode.insertBefore(html_header, html_row);
            else if(rowIdx < html_frontmatter.children.length - 1)
                html_row.parentNode.insertBefore(html_header, html_row.nextSibling);
            else
                html_frontmatter.appendChild(html_header);
        }

        function onclick_delrow(event)
        {
            event.preventDefault();
            const html_row = event.target.parentElement.parentElement;
            const rowIdx = html_row.rowIndex;
            if(rowIdx == 0)
            {
                const [html_inputkey, html_inputval] = Array.from(html_row.getElementsByTagName('input'));
                [html_inputkey.value, html_inputval.value] = ['', ''];
            }
            else
                html_frontmatter.deleteRow(rowIdx);
        }

        async function onclick_open(autoopen = false)
        {
            if(!html_url.value)
            {
                clear();
                return moncms_log('clear');
            }

            let prep = github_api_prepare_params(html_url.value, html_token.value);
            if(!html_token.value && html_tokencache.checked)
            {
                html_token.value = cache_load(prep.github_repo_url);
                prep = github_api_prepare_params(html_url.value, html_token.value); 
                moncms_log('got from cache for ' + prep.github_repo_url);
            }

            if(prep.error != '')
            {
                clear();
                return moncms_log(prep.error);
            }

            const resp_file = await fetch(prep.contents_api_url, { method: 'GET', headers: prep.headers });
            const res_file = await resp_file.json();
            
            const resp_dir = prep.contents_api_url != prep.contents_api_dir_url ? (await fetch(prep.contents_api_dir_url, { method: 'GET', headers: prep.headers })) : resp_file;
            const res_dir = prep.contents_api_url != prep.contents_api_dir_url ? (await resp_dir.json()) : res_file;
            
            const msg_file = github_api_format_error(resp_file.status, (res_file || {}).message || '');
            const msg_dir = github_api_format_error(resp_dir.status, (res_dir || {}).message || '');

            const HTTP_OK = 200;
            if(resp_file.status != HTTP_OK || resp_dir.status != HTTP_OK)
            {
                clear();
                return moncms_log(`error ${resp_file.status}, [${res_file.message}] | ${resp_dir.status}, [${JSON.stringify(res_dir)}] `);
            }
            moncms_log(`GET ok ${resp_file.status} | ${resp_dir.status}`);

            if(html_token.value && html_tokencache.checked && !autoopen)
            {
                cache_save(prep.github_repo_url, html_token.value);
                moncms_log('saved to cache for ' + prep.github_repo_url);
            }

            const is_dir = res_file.content === undefined;
            
            retrieved_contents = res_file;
            let [text, frontmatter] = [res_file.encoding == 'base64' ? new TextDecoder().decode(Uint8Array.from(window.atob(res_file.content), m => m.codePointAt(0))) : res_file.encoding == 'none' ? ('<file too large>') : (res_file.content || ''), {}];
            [text, frontmatter] = parse_frontmatter(text); 
            
            html_file_name.value = is_dir ? '' : html_url.value.slice(html_url.value.lastIndexOf('/') + 1);
            html_file_name.title = prep.github_repo_path;

            update_file_tree(res_dir, prep.parentdir_url, html_file_name.value);
            update_frontmatter(frontmatter);
            
            if(is_dir)
            {
                html_file_tree.selectedIndex = 0;
                if(await window.editor_getText())
                {
                    window.editor_setText(text);
                }
                html_file_tree.focus();
            }
            else
            {
                window.editor_setText(text);
            }
        }

        function ondblclick_enter_file_tree(event)
        {
            if (event.type == 'dblclick' || event.code == 'Space' || event.code == 'Enter')
            {
                event.preventDefault();
                const html_option = html_file_tree.options[html_file_tree.selectedIndex];
                html_url.value = html_option.value;
                onclick_open();
            }
        }

        async function onload_body()
        {
            await onload_editor();

            let autoopen = false;
            
            console.log(window.location);

            if(window.location.search)
            {
                const query_string = new URLSearchParams(window.location.search);
                for(const k of ['url', 'token'])
                    document.getElementById('html_' + k).value = query_string.get(k);

                if(query_string.has('tokencache'))
                    html_tokencache.checked = ['1', 'true'].includes(query_string.get('tokencache'));

                autoopen = query_string.has('url');
            }

            if(!html_token.value)
            {
                const prep = github_api_prepare_params(html_url.value);
                if(prep.github_repo_url)
                {
                    html_token.value = cache_load(prep.github_repo_url);
                    if(html_token.value)
                    {
                        moncms_log('got from cache for ' + prep.github_repo_url);
                        html_tokencache.checked = true;
                        autoopen = true;
                    }
                }
            }

            if(autoopen && (html_url.value))
                onclick_open(true);
            else
                html_url.focus();
        }
        </script>
    </body>
</html>
